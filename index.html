></section><section class='overlay' id='endO'><div class='panel'><span class='crest'></span><h2 id='endTitle'>쓰러졌다</h2><p id='endCopy'>다시 밤으로 들어갈 수 있습니다.</p><button class='primary' id='again'>RETRY</button></div></section><div class='stick' id='stick'><span id='knob'></span></div></main></div><script> (function () { 'use strict'; const $ = (selector) => document.querySelector(selector); const $$ = (selector) => Array.from(document.querySelectorAll(selector)); const canvas = $('#game'); const ctx = canvas.getContext('2d'); const ui = { hpT: $('#hpT'), hpB: $('#hpB'), xpT: $('#xpT'), xpB: $('#xpB'), timeT: $('#timeT'), lvT: $('#lvT'), killT: $('#killT'), startO: $('#startO'), choiceO: $('#choiceO'), endO: $('#endO'), endTitle: $('#endTitle'), endCopy: $('#endCopy'), choiceInfo: $('#choiceInfo'), cards: $('#cards'), pause: $('#pause'), reset: $('#reset'), start: $('#start'), again: $('#again'), lifeText: $('#lifeText'), lives: $$('[data-life]'), stick: $('#stick'), knob: $('#knob') }; const TAU = Math.PI * 2; const keys = new Set(); const view = { w: 800, h: 500, dpr: 1 }; const joy = { on: false, id: null, x: 0, y: 0 }; let state = null; let last = performance.now(); let lives = 5; const upgrades = [ { name: '피해 증가', desc: '별탄 피해 +5', color: '#e94b5f', icon: '+', apply: (p) => { p.dmg += 5; } }, { name: '빠른 공격', desc: '공격 간격 감소', color: '#f0b94d', icon: '>', apply: (p) => { p.delay = Math.max(0.18, p.delay - 0.07); } }, { name: '이동 속도', desc: '발걸음이 빨라짐', color: '#63c7ee', icon: '^', apply: (p) => { p.speed += 22; } }, { name: '회전 낫', desc: '몸 주변 무기 추가', color: '#f7d36b', icon: 'o', apply: (p) => { p.orbit = Math.min(5, p.orbit + 1); } }, { name: '달빛 오라', desc: '주변 적 지속 피해', color: '#8af0ff', icon: '*', apply: (p) => { p.aura = Math.min(5, p.aura + 1); } }, { name: '흡혈', desc: '최대 HP와 회복 증가', color: '#57d7a3', icon: 'h', apply: (p) => { p.max += 18; p.hp = Math.min(p.max, p.hp + 35); } } ]; function rand(min, max) { return min + Math.random() * (max - min); } function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); } function formatTime(seconds) { return String(Math.floor(seconds / 60)).padStart(2, '0') + ':' + String(Math.floor(seconds % 60)).padStart(2, '0'); } function show(element) { element.classList.add('show'); } function hide(element) { element.classList.remove('show'); } function setLives(value) { lives = clamp(value, 1, 5); ui.lifeText.textContent = '생명 ' + lives + '개 · HP ' + lives * 20; for (const button of ui.lives) { button.classList.toggle('sel', Number(button.dataset.life) === lives); } if (!state) hud(); } function freshGame() { const hp = lives * 20; return { paused: false, choosing: false, over: false, time: 0, spawn: 0, kills: 0, shake: 0, boss: false, p: { x: 0, y: 0, r: 15, hp, max: hp, xp: 0, next: 8, lv: 1, speed: 205, dmg: 19, delay: 0.5, fire: 0.15, inv: 0, orbit: 0, oa: 0, aura: 0, auraTick: 0 }, enemies: [], bullets: [], gems: [], particles: [] }; } function resize() { const rect = canvas.getBoundingClientRect(); view.w = Math.max(300, rect.width); view.h = Math.max(300, rect.height); view.dpr = Math.min(2, devicePixelRatio || 1); canvas.width = Math.floor(view.w * view.dpr); canvas.height = Math.floor(view.h * view.dpr); ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0); } function startGame() { state = freshGame(); hide(ui.startO); hide(ui.choiceO); hide(ui.endO); ui.pause.textContent = '||'; for (let i = 0; i < 7; i += 1) spawnEnemy(); last = performance.now(); hud(); } function spawnEnemy(kind) { if (!state) return; const p = state.p; const angle = rand(0, TAU); const distance = Math.max(view.w, view.h) * 0.42 + rand(35, 90); let type = kind; if (!type) { const roll = Math.random(); type = state.time > 70 && roll > 0.82 ? 'brute' : state.time > 28 && roll > 0.72 ? 'wraith' : 'bat'; } const data = { bat: [13, 30, 112, 9, 2, '#a777f2'], wraith: [18, 62, 86, 13, 5, '#63c7ee'], brute: [25, 132, 62, 21, 10, '#f0b94d'], boss: [42, 1150, 54, 30, 50, '#e94b5f'] }[type]; const scale = 1 + state.time / 120; state.enemies.push({ kind: type, x: p.x + Math.cos(angle) * distance, y: p.y + Math.sin(angle) * distance, r: data[0], hp: data[1] * scale, max: data[1] * scale, speed: data[2], dmg: data[3], xp: data[4], color: data[5], hit: 0, touch: 0 }); } function update(dt) { if (!state || state.paused || state.choosing || state.over) return; const p = state.p; state.time += dt; state.spawn -= dt; state.shake = Math.max(0, state.shake - dt * 10); p.inv = Math.max(0, p.inv - dt); p.fire -= dt; p.auraTick -= dt; p.oa += dt * 3.2; movePlayer(dt); if (state.spawn <= 0) { const count = state.time > 80 ? 3 : state.time > 35 ? 2 : 1; for (let i = 0; i < count; i += 1) spawnEnemy(); state.spawn = clamp(0.8 - state.time / 260, 0.18, 0.8); } if (state.time > 115 && !state.boss) { state.boss = true; spawnEnemy('boss'); } attack(); updateEnemies(dt); updateBullets(dt); updateGems(dt); updateParticles(dt); if (state.time > 165 && state.boss && !state.enemies.some((enemy) => enemy.kind === 'boss')) { finish(true); } hud(); } function movePlayer(dt) { const p = state.p; let mx = 0; let my = 0; if (keys.has('a') || keys.has('arrowleft')) mx -= 1; if (keys.has('d') || keys.has('arrowright')) mx += 1; if (keys.has('w') || keys.has('arrowup')) my -= 1; if (keys.has('s') || keys.has('arrowdown')) my += 1; if (joy.on && Math.hypot(joy.x, joy.y) > 0.08) { mx = joy.x; my = joy.y; } const len = Math.hypot(mx, my); if (len) { p.x += (mx / len) * p.speed * dt; p.y += (my / len) * p.speed * dt; } } function nearestEnemy(range) { const p = state.p; let best = null; let bestDistance = range; for (const enemy of state.enemies) { const distance = Math.hypot(enemy.x - p.x, enemy.y - p.y); if (distance < bestDistance) { bestDistance = distance; best = enemy; } } return best; } function attack() { const p = state.p; if (p.fire <= 0) { const enemy = nearestEnemy(620); if (enemy) { const angle = Math.atan2(enemy.y - p.y, enemy.x - p.x); state.bullets.push({ x: p.x, y: p.y, vx: Math.cos(angle) * 500, vy: Math.sin(angle) * 500, life: 1.15, dmg: p.dmg }); p.fire = p.delay; } } if (p.aura && p.auraTick <= 0) { const radius = 78 + p.aura * 17; for (const enemy of state.enemies) { if (Math.hypot(enemy.x - p.x, enemy.y - p.y) < radius + enemy.r) { hurt(enemy, 7 + p.aura * 8); } } p.auraTick = 0.45; } if (p.orbit) { const radius = 55 + p.orbit * 8; for (let i = 0; i < p.orbit; i += 1) { const angle = p.oa + (i / p.orbit) * TAU; const bx = p.x + Math.cos(angle) * radius; const by = p.y + Math.sin(angle) * radius; for (const enemy of state.enemies) { if ((enemy.blade || 0) < state.time && Math.hypot(enemy.x - bx, enemy.y - by) < enemy.r + 13) { hurt(enemy, 16 + p.orbit * 4); enemy.blade = state.time + 0.36; } } } } } function hurt(enemy, damage) { enemy.hp -= damage; enemy.hit = 1; state.particles.push({ x: enemy.x, y: enemy.y, color: '#fff4cd', life: 0.25, size: 2 }); } function updateEnemies(dt) { const p = state.p; for (const enemy of state.enemies) { const angle = Math.atan2(p.y - enemy.y, p.x - enemy.x); enemy.x += Math.cos(angle) * enemy.speed * dt; enemy.y += Math.sin(angle) * enemy.speed * dt; enemy.hit = Math.max(0, enemy.hit - dt * 5); enemy.touch = Math.max(0, enemy.touch - dt); if (Math.hypot(enemy.x - p.x, enemy.y - p.y) < enemy.r + p.r && enemy.touch <= 0 && p.inv <= 0) { p.hp -= enemy.dmg; p.inv = 0.55; enemy.touch = 0.7; state.shake = 5; if (p.hp <= 0) { p.hp = 0; finish(false); } } } const dead = state.enemies.filter((enemy) => enemy.hp <= 0); for (const enemy of dead) { state.kills += enemy.kind === 'boss' ? 15 : 1; const gemCount = enemy.kind === 'boss' ? 12 : enemy.xp > 6 ? 3 : 1; for (let i = 0; i < gemCount; i += 1) { const angle = rand(0, TAU); state.gems.push({ x: enemy.x, y: enemy.y, vx: Math.cos(angle) * rand(40, 120), vy: Math.sin(angle) * rand(40, 120), value: Math.max(1, Math.round(enemy.xp / 3)), r: enemy.xp > 6 ? 7 : 5 }); } for (let i = 0; i < 18; i += 1) { state.particles.push({ x: enemy.x, y: enemy.y, vx: rand(-90, 90), vy: rand(
