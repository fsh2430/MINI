<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#101116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Night Mini">
<title>Mini Night Survivors</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<style>
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;overscroll-behavior:none;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}body{background:linear-gradient(140deg,#101116,#18140f 52%,#0d1513);color:#f7efe8;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{height:100dvh;padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));display:grid;grid-template-rows:auto 1fr;gap:8px}.hud{padding:8px;border:1px solid #ffffff26;border-radius:8px;background:#16181de0;display:grid;grid-template-columns:minmax(160px,1fr) minmax(160px,320px) auto;gap:8px;align-items:center}.brand{display:flex;align-items:center;gap:9px;min-width:0}.mark,.crest{border-radius:50%;background:radial-gradient(circle at 43% 30%,#fff4cd 0 8%,transparent 9%),radial-gradient(circle at 50% 58%,#251822 0 30%,transparent 31%),conic-gradient(from 215deg,#e94b5f,#f0b94d,#a777f2,#63c7ee,#e94b5f);box-shadow:inset 0 -12px 18px #0008,0 0 24px #e94b5f42}.mark{width:36px;height:36px;flex:0 0 auto}h1,p{margin:0}h1{font-size:clamp(17px,2.4vw,24px);line-height:1.05}.brand p{margin-top:3px;color:#b9b4aa;font-size:12px}.bars{display:grid;gap:7px}.bar{display:grid;grid-template-columns:28px 68px 1fr;gap:7px;align-items:center}.bar span,.stats span{color:#b9b4aa;font-size:11px;font-weight:800}.bar strong,.stats strong{font-size:13px;font-variant-numeric:tabular-nums}.bar i{height:10px;min-width:70px;border:1px solid #ffffff2e;border-radius:999px;overflow:hidden;background:#ffffff14}.bar b{display:block;width:100%;height:100%;transform-origin:left center}#hpB{background:linear-gradient(90deg,#e94b5f,#f0b94d)}#xpB{background:linear-gradient(90deg,#63c7ee,#57d7a3)}.stats{display:grid;grid-template-columns:repeat(3,minmax(48px,auto));gap:6px}.stats div{padding:6px 7px;border:1px solid #ffffff26;border-radius:7px;background:#ffffff10}.stats strong{display:block;margin-top:2px;font-size:15px}.stage{position:relative;min-height:0;border:1px solid #ffffff26;border-radius:8px;overflow:hidden;background:#0f1115;box-shadow:0 24px 70px #0009}canvas{width:100%;height:100%;display:block}.overlay{position:absolute;inset:0;z-index:5;display:grid;place-items:center;padding:16px;background:#08090c94;backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .14s}.overlay.show{opacity:1;pointer-events:auto}.panel{width:min(92vw,520px);padding:24px;border:1px solid #ffffff29;border-radius:8px;background:#0f1115f0;box-shadow:0 28px 80px #000c;text-align:center}.crest{display:block;width:70px;height:70px;margin:0 auto 14px}.panel h2{margin:0;font-size:clamp(24px,5vw,36px)}.panel p{margin:9px auto 18px;color:#b9b4aa;line-height:1.5}.primary{min-width:92px;min-height:52px;padding:0 24px;border:1px solid #ffffff2e;border-radius:8px;background:linear-gradient(135deg,#e94b5f,#f0b94d);color:#160f10;font:900 20px inherit}.stick{position:absolute;left:max(18px,env(safe-area-inset-left));bottom:max(18px,env(safe-area-inset-bottom));z-index:3;width:96px;height:96px;border:1px solid #ffffff29;border-radius:50%;background:#ffffff14;opacity:.76}.stick span{position:absolute;left:50%;top:50%;width:38px;height:38px;border-radius:50%;background:#f7efe8d1;transform:translate(-50%,-50%)}@media(max-width:760px){.hud{grid-template-columns:1fr}.brand p{display:none}.stats{grid-template-columns:repeat(3,1fr)}}@media(max-height:500px) and (orientation:landscape){.app{padding:max(6px,env(safe-area-inset-top)) max(6px,env(safe-area-inset-right)) max(6px,env(safe-area-inset-bottom)) max(6px,env(safe-area-inset-left));gap:6px}.hud{grid-template-columns:minmax(130px,1fr) minmax(170px,320px) auto;padding:6px}.brand p{display:none}.mark{width:31px;height:31px}h1{font-size:17px}.stick{width:82px;height:82px}.stick span{width:32px;height:32px}}
</style>
</head>
<body>
<div class="app"><header class="hud"><div class="brand"><span class="mark"></span><div><h1>Mini Night Survivors</h1><p>아이폰 홈 화면 생존전</p></div></div><div class="bars"><div class="bar"><span>HP</span><strong id="hpT">100/100</strong><i><b id="hpB"></b></i></div><div class="bar"><span>XP</span><strong id="xpT">0/8</strong><i><b id="xpB"></b></i></div></div><div class="stats"><div><span>TIME</span><strong id="timeT">00:00</strong></div><div><span>LV</span><strong id="lvT">1</strong></div><div><span>KILL</span><strong id="killT">0</strong></div></div></header><main class="stage"><canvas id="game"></canvas><section class="overlay show" id="startO"><div class="panel"><span class="crest"></span><h2>밤이 열린다</h2><p>움직이기만 하세요. 공격은 자동입니다.</p><button class="primary" id="start">START</button></div></section><section class="overlay" id="endO"><div class="panel"><span class="crest"></span><h2 id="endTitle">쓰러졌다</h2><p id="endCopy">다시 밤으로 들어갈 수 있습니다.</p><button class="primary" id="again">RETRY</button></div></section><div class="stick" id="stick"><span id="knob"></span></div></main></div>
<script>
(function(){
'use strict';
function $(s){return document.querySelector(s)}
const c=$('#game'),x=c.getContext('2d'),ui={hpT:$('#hpT'),hpB:$('#hpB'),xpT:$('#xpT'),xpB:$('#xpB'),timeT:$('#timeT'),lvT:$('#lvT'),killT:$('#killT'),startO:$('#startO'),endO:$('#endO'),endTitle:$('#endTitle'),endCopy:$('#endCopy'),start:$('#start'),again:$('#again'),stick:$('#stick'),knob:$('#knob')};
const TAU=Math.PI*2,keys=new Set(),joy={on:false,id:null,x:0,y:0};
let W=800,H=500,DPR=1,g=null,last=performance.now();
function rnd(a,b){return a+Math.random()*(b-a)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function fmt(t){return String(Math.floor(t/60)).padStart(2,'0')+':'+String(Math.floor(t%60)).padStart(2,'0')}
function resize(){const r=c.getBoundingClientRect();W=Math.max(300,r.width);H=Math.max(300,r.height);DPR=Math.min(2,devicePixelRatio||1);c.width=W*DPR|0;c.height=H*DPR|0;x.setTransform(DPR,0,0,DPR,0,0)}
function fresh(){return{time:0,spawn:0,kills:0,over:false,boss:false,p:{x:0,y:0,r:15,hp:100,max:100,xp:0,next:8,lv:1,speed:210,dmg:20,delay:.48,fire:.1,orbit:0,oa:0,inv:0},e:[],b:[],m:[],q:[]}}
function start(){g=fresh();ui.startO.classList.remove('show');ui.endO.classList.remove('show');for(let i=0;i<8;i++)spawn();last=performance.now();hud()}
function spawn(kind){if(!g)return;const p=g.p,a=rnd(0,TAU),dist=Math.max(W,H)*.42+rnd(35,95);if(!kind){const r=Math.random();kind=g.time>70&&r>.82?'brute':g.time>30&&r>.72?'wraith':'bat'}const d={bat:[13,28,115,8,2,'#a777f2'],wraith:[18,60,85,13,5,'#63c7ee'],brute:[25,130,62,20,10,'#f0b94d'],boss:[42,1100,54,30,40,'#e94b5f']}[kind],scale=1+g.time/120;g.e.push({kind:kind,x:p.x+Math.cos(a)*dist,y:p.y+Math.sin(a)*dist,r:d[0],hp:d[1]*scale,max:d[1]*scale,sp:d[2],dmg:d[3],xp:d[4],color:d[5],hit:0,touch:0})}
function update(dt){if(!g||g.over)return;const p=g.p;g.time+=dt;g.spawn-=dt;p.inv=Math.max(0,p.inv-dt);p.fire-=dt;p.oa+=dt*3;move(dt);if(g.spawn<=0){const n=g.time>80?3:g.time>35?2:1;for(let i=0;i<n;i++)spawn();g.spawn=clamp(.8-g.time/260,.18,.8)}if(g.time>115&&!g.boss){g.boss=true;spawn('boss')}shoot();enemies(dt);bullets(dt);gems(dt);parts(dt);if(g.time>165&&g.boss&&!g.e.some(v=>v.kind==='boss'))finish(true);hud()}
function move(dt){const p=g.p;let mx=0,my=0;if(keys.has('a')||keys.has('arrowleft'))mx--;if(keys.has('d')||keys.has('arrowright'))mx++;if(keys.has('w')||keys.has('arrowup'))my--;if(keys.has('s')||keys.has('arrowdown'))my++;if(joy.on&&Math.hypot(joy.x,joy.y)>.08){mx=joy.x;my=joy.y}const l=Math.hypot(mx,my);if(l){p.x+=mx/l*p.speed*dt;p.y+=my/l*p.speed*dt}}
function nearest(r){const p=g.p;let best=null,bd=r;for(const e of g.e){const d=Math.hypot(e.x-p.x,e.y-p.y);if(d<bd){bd=d;best=e}}return best}
function shoot(){const p=g.p;if(p.fire<=0){const e=nearest(620);if(e){const a=Math.atan2(e.y-p.y,e.x-p.x);g.b.push({x:p.x,y:p.y,vx:Math.cos(a)*500,vy:Math.sin(a)*500,life:1.15,dmg:p.dmg});p.fire=p.delay}}if(p.orbit){for(let i=0;i<p.orbit;i++){const a=p.oa+i/p.orbit*TAU,bx=p.x+Math.cos(a)*(60+p.orbit*8),by=p.y+Math.sin(a)*(60+p.orbit*8);for(const e of g.e){if((e.blade||0)<g.time&&Math.hypot(e.x-bx,e.y-by)<e.r+13){hurt(e,16+p.orbit*4);e.blade=g.time+.38}}}}}
function hurt(e,d){e.hp-=d;e.hit=1;g.q.push({x:e.x,y:e.y,c:'#fff4cd',life:.25,s:2})}
function enemies(dt){const p=g.p;for(const e of g.e){const a=Math.atan2(p.y-e.y,p.x-e.x);e.x+=Math.cos(a)*e.sp*dt;e.y+=Math.sin(a)*e.sp*dt;e.hit=Math.max(0,e.hit-dt*5);e.touch=Math.max(0,e.touch-dt);if(Math.hypot(e.x-p.x,e.y-p.y)<e.r+p.r&&e.touch<=0&&p.inv<=0){p.hp-=e.dmg;p.inv=.55;e.touch=.65;if(p.hp<=0){p.hp=0;finish(false)}}}const dead=g.e.filter(e=>e.hp<=0);for(const e of dead){g.kills+=e.kind==='boss'?15:1;for(let i=0;i<(e.kind==='boss'?12:e.xp>6?3:1);i++){const a=rnd(0,TAU);g.m.push({x:e.x,y:e.y,vx:Math.cos(a)*rnd(40,120),vy:Math.sin(a)*rnd(40,120),v:Math.max(1,Math.round(e.xp/3)),r:e.xp>6?7:5})}for(let i=0;i<14;i++)g.q.push({x:e.x,y:e.y,vx:rnd(-90,90),vy:rnd(-90,90),c:e.color,life:rnd(.25,.75),s:rnd(1,4)})}g.e=g.e.filter(e=>e.hp>0)}
function bullets(dt){for(const b of g.b){b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;for(const e of g.e){if(!b.dead&&Math.hypot(e.x-b.x,e.y-b.y)<e.r+6){hurt(e,b.dmg);b.dead=true}}}g.b=g.b.filter(b=>b.life>0&&!b.dead)}
function gems(dt){const p=g.p;for(const m of g.m){m.vx*=Math.pow(.025,dt);m.vy*=Math.pow(.025,dt);m.x+=m.vx*dt;m.y+=m.vy*dt;const d=Math.hypot(m.x-p.x,m.y-p.y);if(d<100){m.x+=(p.x-m.x)/Math.max(1,d)*480*dt;m.y+=(p.y-m.y)/Math.max(1,d)*480*dt}}const got=g.m.filter(m=>Math.hypot(m.x-p.x,m.y-p.y)<p.r+m.r+2);for(const m of got)gain(m.v);g.m=g.m.filter(m=>!got.includes(m))}
function gain(v){const p=g.p;p.xp+=v;while(p.xp>=p.next){p.xp-=p.next;p.lv++;p.next=Math.floor(p.next*1.25+5);if(p.lv%4===0)p.orbit=Math.min(5,p.orbit+1);else if(p.lv%3===0)p.delay=Math.max(.18,p.delay-.06);else if(p.lv%2===0)p.speed+=14;else p.dmg+=4;p.hp=Math.min(p.max,p.hp+10)}}
function parts(dt){for(const q of g.q){q.x+=(q.vx||0)*dt;q.y+=(q.vy||0)*dt;q.life-=dt}g.q=g.q.filter(q=>q.life>0).slice(-300)}
function finish(win){g.over=true;ui.endTitle.textContent=win?'밤을 버텼다':'쓰러졌다';ui.endCopy.textContent=fmt(g.time)+' 동안 '+g.kills+'마리를 베었습니다.';ui.endO.classList.add('show')}
function hud(){const p=g?g.p:fresh().p;ui.hpT.textContent=Math.ceil(p.hp)+'/'+p.max;ui.hpB.style.transform='scaleX('+clamp(p.hp/p.max,0,1)+')';ui.xpT.textContent=p.xp+'/'+p.next;ui.xpB.style.transform='scaleX('+clamp(p.xp/p.next,0,1)+')';ui.timeT.textContent=fmt(g?g.time:0);ui.lvT.textContent=p.lv;ui.killT.textContent=g?g.kills:0}
function draw(){const s=g||fresh(),p=s.p,cx=p.x-W/2,cy=p.y-H/2;x.clearRect(0,0,W,H);const bg=x.createLinearGradient(0,0,W,H);bg.addColorStop(0,'#101219');bg.addColorStop(.5,'#15120f');bg.addColorStop(1,'#0d1513');x.fillStyle=bg;x.fillRect(0,0,W,H);x.strokeStyle='rgba(255,255,255,.045)';x.beginPath();for(let xx=-((cx%58)+58)%58;xx<W+58;xx+=58){x.moveTo(xx,0);x.lineTo(xx,H)}for(let yy=-((cy%58)+58)%58;yy<H+58;yy+=58){x.moveTo(0,yy);x.lineTo(W,yy)}x.stroke();x.save();x.translate(-cx,-cy);for(const m of s.m)diamond(m.x,m.y,m.r,m.v>4?'#f7d36b':'#63c7ee');for(const b of s.b){x.fillStyle='#f2f7ff';x.beginPath();x.arc(b.x,b.y,5,0,TAU);x.fill()}for(const e of s.e)enemyDraw(e);playerDraw(p,s.time);if(p.orbit){for(let i=0;i<p.orbit;i++){const a=p.oa+i/p.orbit*TAU;diamond(p.x+Math.cos(a)*(60+p.orbit*8),p.y+Math.sin(a)*(60+p.orbit*8),12,'#f7d36b')}}for(const q of s.q){x.globalAlpha=clamp(q.life,0,1);x.fillStyle=q.c;x.beginPath();x.arc(q.x,q.y,q.s||2,0,TAU);x.fill();x.globalAlpha=1}x.restore();const vg=x.createRadialGradient(W/2,H/2,W*.2,W/2,H/2,W*.78);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.48)');x.fillStyle=vg;x.fillRect(0,0,W,H)}
function diamond(px,py,r,col){x.save();x.translate(px,py);x.rotate(Math.PI/4);x.fillStyle=col;x.fillRect(-r,-r,r*2,r*2);x.restore()}
function enemyDraw(e){x.fillStyle='rgba(0,0,0,.32)';x.beginPath();x.ellipse(e.x,e.y+e.r*.8,e.r,e.r*.32,0,0,TAU);x.fill();x.fillStyle=e.hit?'#fff4cd':e.color;x.beginPath();x.arc(e.x,e.y,e.r,0,TAU);x.fill();x.fillStyle='#fff4cd';x.beginPath();x.arc(e.x-e.r*.27,e.y-e.r*.15,2.2,0,TAU);x.arc(e.x+e.r*.27,e.y-e.r*.15,2.2,0,TAU);x.fill()}
function playerDraw(p,t){x.save();x.translate(p.x,p.y+Math.sin(t*8)*1.6);x.globalAlpha=p.inv&&Math.floor(t*18)%2?.5:1;x.fillStyle='rgba(0,0,0,.32)';x.beginPath();x.ellipse(0,18,18,7,0,0,TAU);x.fill();x.fillStyle='#6c2f3f';x.beginPath();x.moveTo(0,-24);x.quadraticCurveTo(22,-7,14,21);x.quadraticCurveTo(0,28,-14,21);x.quadraticCurveTo(-22,-7,0,-24);x.fill();x.fillStyle='#22171d';x.beginPath();x.arc(0,-9,13,0,TAU);x.fill();x.fillStyle='#f7d36b';x.beginPath();x.arc(-5,-12,2.2,0,TAU);x.arc(5,-12,2.2,0,TAU);x.fill();x.restore()}
function loop(now){const dt=Math.min(.033,(now-last)/1000||0);last=now;update(dt);draw();requestAnimationFrame(loop)}
function setJoy(clientX,clientY){const r=ui.stick.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=clientX-cx,dy=clientY-cy,len=Math.hypot(dx,dy),max=r.width*.32,nx=len?dx/len:0,ny=len?dy/len:0,mag=Math.min(1,len/max);joy.x=nx*mag;joy.y=ny*mag;ui.knob.style.transform='translate(calc(-50% + '+(nx*mag*max)+'px),calc(-50% + '+(ny*mag*max)+'px))'}
addEventListener('resize',resize);addEventListener('keydown',e=>{const k=e.key.toLowerCase();keys.add(k);if([' ','arrowleft','arrowright','arrowup','arrowdown','w','a','s','d'].includes(k))e.preventDefault()});addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));ui.stick.addEventListener('pointerdown',e=>{joy.on=true;joy.id=e.pointerId;ui.stick.setPointerCapture(e.pointerId);setJoy(e.clientX,e.clientY)});ui.stick.addEventListener('pointermove',e=>{if(joy.on&&e.pointerId===joy.id)setJoy(e.clientX,e.clientY)});for(const ev of ['pointerup','pointercancel'])ui.stick.addEventListener(ev,e=>{if(e.pointerId===joy.id){joy.on=false;joy.x=0;joy.y=0;ui.knob.style.transform='translate(-50%,-50%)'}});ui.start.addEventListener('click',start);ui.again.addEventListener('click',start);document.addEventListener('contextmenu',e=>e.preventDefault());document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});if('serviceWorker' in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));resize();hud();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
